name: ORMS Dashboard CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-size: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Eslint
        run: npm run lint

      - name: Check TypeScript Compilation
        run: npx tsc --noEmit

      - name: Run Unit & Integration Tests
        run: npm run test
        env:
          MONGODB_URI: mongodb://localhost:27017/reviews_test
          API_SERVER_URL: http://localhost:8000

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          MONGODB_URI: mongodb://localhost:27017/reviews_test
          API_SERVER_URL: http://localhost:8000

      - name: Verify Production Build
        run: npm run build
        env:
          MONGODB_URI: mongodb://localhost:27017/reviews_test
          API_SERVER_URL: http://localhost:8000
