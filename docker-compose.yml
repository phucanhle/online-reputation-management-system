version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orms-web-dashboard
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/reviews
      - API_SERVER_URL=http://crawler-backend:8000
    depends_on:
      - mongodb

  mongodb:
    image: mongo:6.0
    container_name: orms-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
